<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteAI — Smart Waste Classifier</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♻</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0b; --surface: #111814; --surface2: #182019;
    --border: #2a3a2c; --accent: #4ade80; --accent2: #22c55e;
    --text: #e8f5e9; --muted: #6b7c6e; --danger: #f87171; --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

  header { display: flex; align-items: center; gap: 1rem; padding: 2rem 0 2.5rem; }
  .logo-mark { width: 48px; height: 48px; border: 2px solid var(--accent); border-radius: 12px; display: grid; place-items: center; font-size: 1.4rem; animation: pulse-border 3s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.3); } 50% { box-shadow: 0 0 0 8px rgba(74,222,128,0); } }
  header h1 { font-size: 1.8rem; font-weight: 800; }
  header h1 span { color: var(--accent); }
  header p { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  .upload-label { display: block; border: 2px dashed var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; background: rgba(17,24,20,0.85); backdrop-filter: blur(6px); cursor: pointer; transition: all 0.2s; }
  .upload-label:hover, .upload-label.drag-over { border-color: var(--accent); background: rgba(24,32,25,0.92); }
  .upload-label h2 { font-size: 1.2rem; font-weight: 600; margin: 1rem 0 0.4rem; }
  .upload-label p { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .upload-icon { font-size: 3rem; display: block; }
  #file-input { display: none; }
  .fake-btn { display: inline-block; margin-top: 1.2rem; padding: 0.65rem 1.6rem; background: var(--accent); color: #0a0e0b; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }

  #preview-section { display: none; margin-top: 1.5rem; }
  .preview-card { background: rgba(17,24,20,0.9); backdrop-filter: blur(6px); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .preview-img-wrap { background: #0d120f; display: flex; align-items: center; justify-content: center; padding: 1.5rem; min-height: 200px; }
  .preview-img-wrap img { max-height: 260px; max-width: 100%; border-radius: 8px; object-fit: contain; }
  .preview-meta { padding: 1.2rem 1.5rem; }
  .file-tag { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 6px; display: inline-block; margin-bottom: 1rem; word-break: break-all; }
  .analyze-btn { display: block; width: 100%; padding: 0.85rem; background: var(--accent); color: #0a0e0b; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .analyze-btn:hover { background: var(--accent2); }
  .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }

  #loading { display: none; text-align: center; padding: 2.5rem; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); }

  #result-section { display: none; margin-top: 1.5rem; }

  .result-header { background: rgba(17,24,20,0.9); backdrop-filter: blur(6px); border: 1px solid var(--border); border-left: 4px solid var(--result-color, var(--accent)); border-radius: 12px; padding: 1.5rem; display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1rem; }
  .result-icon { font-size: 2.8rem; }
  .result-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .result-class { font-size: 1.8rem; font-weight: 800; text-transform: capitalize; }
  .result-conf { font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-top: 0.2rem; }
  .conf-high { color: var(--accent); } .conf-med { color: var(--warn); } .conf-low { color: var(--danger); }

  .low-conf-warning { margin-bottom: 1rem; padding: 0.9rem 1rem; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 10px; display: none; gap: 0.7rem; align-items: flex-start; }
  .low-conf-warning .warn-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .low-conf-warning .warn-text { font-size: 0.8rem; color: var(--warn); line-height: 1.5; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .meta-card { background: rgba(17,24,20,0.9); backdrop-filter: blur(6px); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; }
  .meta-card .label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
  .meta-card .value { font-size: 0.88rem; font-weight: 600; }

  .process-card { background: rgba(17,24,20,0.9); backdrop-filter: blur(6px); border: 1px solid var(--border); border-radius: 12px; padding: 1.4rem; margin-bottom: 1rem; }
  .process-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
  .process-title { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .recyclable-badge { font-family: 'Space Mono', monospace; font-size: 0.62rem; padding: 0.25rem 0.65rem; border-radius: 100px; font-weight: 700; }
  .recyclable-badge.yes { background: rgba(74,222,128,0.12); color: var(--accent); border: 1px solid rgba(74,222,128,0.3); }
  .recyclable-badge.no  { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }

  .steps-list { display: flex; flex-direction: column; }
  .step-item { display: flex; gap: 1rem; align-items: flex-start; padding: 0.9rem 0; border-bottom: 1px solid rgba(42,58,44,0.5); opacity: 0; transform: translateX(-12px); transition: opacity 0.4s ease, transform 0.4s ease; }
  .step-item:last-child { border-bottom: none; }
  .step-item.visible { opacity: 1; transform: translateX(0); }
  .step-number { width: 28px; height: 28px; border-radius: 50%; background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--accent); font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .step-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
  .step-content { flex: 1; }
  .step-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
  .step-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

  .rate-wrap { margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid rgba(42,58,44,0.5); }
  .rate-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
  .rate-bar-wrap { background: var(--surface2); border-radius: 6px; height: 10px; overflow: hidden; }
  .rate-bar { height: 100%; border-radius: 6px; background: var(--accent); transition: width 1s cubic-bezier(0.16,1,0.3,1); width: 0; }
  .rate-bar.low { background: var(--danger); }
  .rate-bar.mid { background: var(--warn); }

  .fun-fact { margin-top: 1rem; padding: 0.9rem 1rem; background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.15); border-radius: 10px; display: flex; gap: 0.7rem; align-items: flex-start; }
  .fun-fact-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .fun-fact-text { font-size: 0.8rem; color: var(--muted); line-height: 1.5; font-style: italic; }

  .probs-card { background: rgba(17,24,20,0.9); backdrop-filter: blur(6px); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
  .probs-card h3 { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
  .prob-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.55rem; }
  .prob-label { font-family: 'Space Mono', monospace; font-size: 0.72rem; width: 80px; text-transform: capitalize; }
  .prob-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .prob-bar { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); width: 0; }
  .prob-bar.top { background: var(--accent); } .prob-bar.other { background: #2a3a2c; }
  .prob-pct { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); width: 44px; text-align: right; }

  .perf-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; background: var(--surface); border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 100px; color: var(--muted); margin-bottom: 1rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .retry-btn { display: block; width: 100%; padding: 0.65rem; background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; margin-bottom: 2rem; }
  .retry-btn:hover { border-color: var(--accent); color: var(--accent); }
  .error-box { background: #1a0a0a; border: 1px solid var(--danger); border-radius: 10px; padding: 1rem 1.2rem; color: var(--danger); font-family: 'Space Mono', monospace; font-size: 0.78rem; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <header>
    <div class="logo-mark">♻</div>
    <div>
      <h1>Waste<span>AI</span></h1>
      <p>SMART WASTE CLASSIFICATION — MOBILENETV3</p>
    </div>
  </header>

  <label class="upload-label" for="file-input" id="upload-label">
    <span class="upload-icon">🗂️</span>
    <h2>Drop a waste image here</h2>
    <p>PNG · JPG · WEBP — max 16 MB</p>
    <span class="fake-btn">Browse File</span>
  </label>
  <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.webp">
  <div class="error-box" id="error-box"></div>

  <div id="preview-section">
    <div class="preview-card">
      <div class="preview-img-wrap"><img id="preview-img" src="" alt="Preview"></div>
      <div class="preview-meta">
        <div class="file-tag" id="file-name-tag">—</div>
        <button class="analyze-btn" id="analyze-btn">Classify Waste →</button>
      </div>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div><p>Running inference...</p></div>

  <div id="result-section">

    <div class="result-header" id="result-header">
      <div class="result-icon" id="res-icon">♻️</div>
      <div>
        <div class="result-label">Classified as</div>
        <div class="result-class" id="res-class">—</div>
        <div class="result-conf" id="res-conf">—</div>
      </div>
    </div>

    <div class="low-conf-warning" id="low-conf-warning">
      <span class="warn-icon">⚠️</span>
      <span class="warn-text" id="warn-text">—</span>
    </div>

    <div class="meta-grid">
      <div class="meta-card"><div class="label">Disposal bin</div><div class="value" id="res-bin">—</div></div>
      <div class="meta-card"><div class="label">Quick tip</div><div class="value" style="font-size:0.8rem" id="res-tip">—</div></div>
    </div>

    <div class="process-card">
      <div class="process-header">
        <span class="process-title">Recycling process</span>
        <span class="recyclable-badge" id="recyclable-badge">—</span>
      </div>
      <div class="steps-list" id="steps-list"></div>
      <div class="rate-wrap">
        <div class="rate-label"><span>Global recycling rate</span><span id="rate-pct">—</span></div>
        <div class="rate-bar-wrap"><div class="rate-bar" id="rate-bar"></div></div>
      </div>
      <div class="fun-fact">
        <span class="fun-fact-icon">💡</span>
        <span class="fun-fact-text" id="fun-fact">—</span>
      </div>
    </div>

    <div class="probs-card">
      <h3>All class probabilities</h3>
      <div id="prob-bars"></div>
    </div>

    <div class="perf-badge"><div class="dot"></div><span id="inference-time">— ms inference</span></div>
    <button class="retry-btn" onclick="reset()">← Classify another image</button>
  </div>
</div>

<script>
  var canvas = document.getElementById('bg');
  var ctx = canvas.getContext('2d');
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas(); window.addEventListener('resize', resizeCanvas);
  var icons = ['♻','🥫','📦','🫙','📄','🧴','🗑️','♻'];
  var particles = [];
  for (var i = 0; i < 45; i++) { particles.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, icon: icons[Math.floor(Math.random()*icons.length)], size: 10+Math.random()*20, speedX: (Math.random()-0.5)*0.35, speedY: -0.15-Math.random()*0.45, opacity: 0.035+Math.random()*0.1, rotation: Math.random()*360, rotSpeed: (Math.random()-0.5)*0.5 }); }
  function drawBg() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#0a0e0b'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(74,222,128,0.03)'; ctx.lineWidth=1;
    for (var x=0;x<canvas.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for (var y=0;y<canvas.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    particles.forEach(function(p){ ctx.save(); ctx.globalAlpha=p.opacity; ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180); ctx.font=p.size+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.icon,0,0); ctx.restore(); p.x+=p.speedX; p.y+=p.speedY; p.rotation+=p.rotSpeed; if(p.y<-40){p.y=canvas.height+40;p.x=Math.random()*canvas.width;} if(p.x<-40)p.x=canvas.width+40; if(p.x>canvas.width+40)p.x=-40; });
    requestAnimationFrame(drawBg);
  }
  drawBg();

  var fileInput=document.getElementById('file-input'), analyzeBtn=document.getElementById('analyze-btn'), uploadLabel=document.getElementById('upload-label'), errorBox=document.getElementById('error-box'), selectedFile=null;
  fileInput.addEventListener('change', function(){ if(this.files&&this.files[0]) handleFile(this.files[0]); });
  uploadLabel.addEventListener('dragover',  function(e){e.preventDefault();uploadLabel.classList.add('drag-over');});
  uploadLabel.addEventListener('dragleave', function(e){e.preventDefault();uploadLabel.classList.remove('drag-over');});
  uploadLabel.addEventListener('drop', function(e){e.preventDefault();uploadLabel.classList.remove('drag-over');if(e.dataTransfer.files&&e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
  analyzeBtn.addEventListener('click', analyze);

  function handleFile(file) {
    if(['image/jpeg','image/png','image/webp'].indexOf(file.type)===-1){showError('Please upload a JPG, PNG, or WEBP image.');return;}
    selectedFile=file; hideError();
    var reader=new FileReader();
    reader.onload=function(e){ document.getElementById('preview-img').src=e.target.result; document.getElementById('file-name-tag').textContent=file.name+'  ·  '+(file.size/1024).toFixed(1)+' KB'; document.getElementById('preview-section').style.display='block'; document.getElementById('result-section').style.display='none'; document.getElementById('loading').style.display='none'; analyzeBtn.disabled=false; };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if(!selectedFile) return;
    analyzeBtn.disabled=true; document.getElementById('loading').style.display='block'; document.getElementById('result-section').style.display='none'; hideError();
    var formData=new FormData(); formData.append('file',selectedFile);
    try {
      var response=await fetch('/predict',{method:'POST',body:formData}); var data=await response.json();
      if(data.error) throw new Error(data.error);
      document.getElementById('loading').style.display='none'; showResults(data);
    } catch(err){ document.getElementById('loading').style.display='none'; analyzeBtn.disabled=false; showError('Error: '+err.message); }
  }

  function showResults(data) {
    document.getElementById('result-header').style.setProperty('--result-color', data.color||'#4ade80');
    document.getElementById('res-icon').textContent=data.icon||'♻️';
    document.getElementById('res-class').textContent=data.predicted_class;

    var conf=data.confidence, confEl=document.getElementById('res-conf');
    confEl.textContent='Confidence: '+conf+'%';
    confEl.className='result-conf '+(conf>=75?'conf-high':conf>=50?'conf-med':'conf-low');

    var warningBox=document.getElementById('low-conf-warning');
    var warnText=document.getElementById('warn-text');
    if(conf<60){
      warnText.textContent='Low confidence ('+conf+'%) — this result may be inaccurate. The image may contain a waste type not in the training set, such as organic or food waste. Please verify before disposal.';
      warningBox.style.display='flex';
    } else {
      warningBox.style.display='none';
    }

    document.getElementById('res-bin').textContent=data.bin||'—';
    document.getElementById('res-tip').textContent=data.tip||'—';
    document.getElementById('inference-time').textContent=data.inference_time_ms+' ms inference';

    var badge=document.getElementById('recyclable-badge');
    if(data.recyclable){badge.textContent='✓ Recyclable';badge.className='recyclable-badge yes';}
    else{badge.textContent='✗ Non-recyclable';badge.className='recyclable-badge no';}

    var stepsList=document.getElementById('steps-list'); stepsList.innerHTML='';
    if(data.process&&data.process.length){
      data.process.forEach(function(s){
        var item=document.createElement('div'); item.className='step-item';
        item.innerHTML='<div class="step-number">'+s.step+'</div><div class="step-icon">'+s.icon+'</div><div class="step-content"><div class="step-title">'+s.title+'</div><div class="step-desc">'+s.desc+'</div></div>';
        stepsList.appendChild(item);
      });
      setTimeout(function(){ stepsList.querySelectorAll('.step-item').forEach(function(item,idx){ setTimeout(function(){item.classList.add('visible');},idx*120); }); },80);
    }

    var rate=data.recycling_rate||0;
    document.getElementById('rate-pct').textContent=rate+'%';
    var rateBar=document.getElementById('rate-bar');
    rateBar.className='rate-bar '+(rate>=60?'':rate>=30?'mid':'low');
    setTimeout(function(){rateBar.style.width=rate+'%';},100);
    document.getElementById('fun-fact').textContent=data.fun_fact||'';

    var container=document.getElementById('prob-bars'); container.innerHTML='';
    var sorted=Object.entries(data.all_probabilities||{}).sort(function(a,b){return b[1]-a[1];});
    sorted.forEach(function(entry){ var cls=entry[0],pct=entry[1],isTop=cls===data.predicted_class; var row=document.createElement('div'); row.className='prob-row'; row.innerHTML='<span class="prob-label">'+cls+'</span><div class="prob-bar-wrap"><div class="prob-bar '+(isTop?'top':'other')+'" data-pct="'+pct+'"></div></div><span class="prob-pct">'+pct+'%</span>'; container.appendChild(row); });
    document.getElementById('result-section').style.display='block';
    setTimeout(function(){ document.querySelectorAll('.prob-bar').forEach(function(bar){bar.style.width=bar.getAttribute('data-pct')+'%';}); },50);
  }

  function reset(){ selectedFile=null; fileInput.value=''; document.getElementById('preview-section').style.display='none'; document.getElementById('result-section').style.display='none'; document.getElementById('loading').style.display='none'; analyzeBtn.disabled=false; hideError(); }
  function showError(msg){errorBox.textContent=msg;errorBox.style.display='block';}
  function hideError(){errorBox.style.display='none';}
</script>
</body>
</html>
